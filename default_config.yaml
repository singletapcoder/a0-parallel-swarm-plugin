# Parallel Swarm Plugin — Default Configuration

# Maximum concurrent agents (adjust based on your hardware/API rate limits)
max_concurrency: 5

# Total token budget across all parallel tasks (prevents runaway costs)
token_budget: 100000

# Per-task token budget (individual task cap)
per_task_budget: 20000

# Auto-classify task complexity (uses LLM to route simple/moderate/complex tasks to appropriate models)
auto_classify: true

# Model overrides by complexity tier (leave empty to use agent's default model)
# simple_model: ""
# complex_model: ""

# Backpressure threshold (0.0-1.0) — throttle when this % of slots are active
backpressure_threshold: 0.8

# Enable shared memory between parallel agents (federated learning)
shared_memory: true

# OpenRouter worker mode defaults (fork extension)
# These are documentation/default hints. Per-task JSON still controls exact
# backend/model/role/output_dir/fallback behavior.
openrouter_timeout_seconds: 120
openrouter_fallback_policy: "stop_not_direct_code"
openrouter_default_role: "cheap_coder"

# Role-to-model defaults used by python/helpers/model_registry.py
# cheap_coder: deepseek/deepseek-chat
# long_context_worker: google/gemini-2.5-flash
# coding_lead: anthropic/claude-sonnet-4
# review_gate: google/gemini-2.5-pro
# architect_arbiter: anthropic/claude-opus-4.1

